name: Ant Java CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]  # タグプッシュ時にも動くように追加
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Build with Ant
      run: ant jar

    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: KnockingBird-jar
        path: "*.jar"

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          *.jar
          gpl-2.0.txt
          readme.txt
